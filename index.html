<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMF Muaythai – Hakem İngilizcesi Eğitim Modülü</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f0f4f9;
  color:#1a1a1a;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* 🏢 Bilgisayar Ekranları İçin Sağ ve Sol Boşluklara Silik Federasyon Logosu */
@media (min-width: 1024px) {
  body {
    background-image: url('assets/images/federasyon-logosu.png'), url('assets/images/federasyon-logosu.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-position: left 5% center, right 5% center;
    background-size: 300px;
    opacity: 0.99;
  }
}

.top-bar{background:#185FA5;color:#fff;padding:16px 12px 0;text-align:center}
.top-bar h1{font-size:15px;font-weight:700;line-height:1.4}
.top-bar p{font-size:11px;opacity:.75;margin-top:3px;padding-bottom:12px}

/* LEVEL 1 - Ana günler */
.day-nav{display:flex;justify-content:center;gap:10px;padding:12px 16px;background:#185FA5;border-top:1px solid rgba(255,255,255,0.2)}
.day-btn{padding:9px 20px;font-size:13px;font-weight:600;border:2px solid rgba(255,255,255,0.7);border-radius:22px;background:transparent;color:#fff;cursor:pointer;transition:all .2s}
.day-btn.active{background:#fff;color:#185FA5;border-color:#fff}

/* LEVEL 2 - Day1: Kayıt/Tartı/Sosyal/Quiz | Day2: Jury/Equipment/... */
.l2-nav{display:flex;justify-content:center;gap:7px;padding:10px 12px;background:#1a6fbc;border-bottom:1px solid rgba(255,255,255,0.15);flex-wrap:wrap}
.l2-btn{padding:7px 14px;font-size:12px;font-weight:600;border:1.5px solid rgba(255,255,255,0.6);border-radius:16px;background:transparent;color:#fff;cursor:pointer;transition:all .15s;white-space:nowrap}
.l2-btn.active{background:#fff;color:#185FA5;border-color:#fff}

/* LEVEL 3 - Day1 sub-groups | Day2 sub-sections */
.l3-nav{display:flex;justify-content:center;gap:6px;padding:8px 12px;background:#e8f0fb;border-bottom:1px solid #cdddf0;flex-wrap:wrap}
.l3-btn{padding:6px 12px;font-size:11px;font-weight:500;border:1px solid #185FA5;border-radius:14px;background:#fff;color:#185FA5;cursor:pointer;transition:all .15s;white-space:nowrap}
.l3-btn.active{background:#185FA5;color:#fff}

/* LEVEL 4 - leaf sections */
.l4-nav{display:flex;justify-content:center;gap:5px;padding:7px 12px;background:#fff;border-bottom:1px solid #e0e8f0;flex-wrap:wrap}
.l4-btn{padding:5px 11px;font-size:11px;border:1px solid #c5d5e8;border-radius:12px;background:#f8fafc;color:#444;cursor:pointer;transition:all .15s;white-space:nowrap}
.l4-btn.active{background:#185FA5;border-color:#185FA5;color:#fff;font-weight:600}

.content{padding:12px;max-width:600px;margin:0 auto;width:100%;flex:1}

.phrase-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:13px 14px;margin-bottom:8px}
.p-en{font-size:14px;font-weight:600;color:#1a1a1a;line-height:1.45;margin-bottom:3px}
.p-alt{font-size:12px;color:#185FA5;font-style:italic;margin-bottom:3px}
.p-ph{font-size:11px;color:#4a90c4;font-style:italic;margin-bottom:5px}
.p-tr{font-size:12px;color:#555;line-height:1.4;margin-bottom:9px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:space-between;}

.sbtn{display:flex;align-items:center;gap:4px;padding:5px 11px;font-size:11px;border:1px solid #ddd;border-radius:8px;background:#f8f8f8;color:#333;cursor:pointer;font-weight:500}
.sbtn:active{background:#e8e8e8}
.sbtn-alt{display:flex;align-items:center;gap:4px;padding:5px 11px;font-size:11px;border:1px solid #c5d5e8;border-radius:8px;background:#f0f4f9;color:#185FA5;cursor:pointer}

/* ⏱️ Kart İçi Mikro Hız Seçici Tasarımı */
.card-speed-wrapper {display:flex;align-items:center;gap:3px;margin-left:auto;background:#f1f5f9;padding:2px 4px;border-radius:6px;border:1px solid #e2e8f0}
.card-speed-label {font-size:9px;color:#64748b;font-weight:600;margin-right:2px}
.card-speed-select {padding:2px 4px;font-size:10px;font-weight:700;border:1px solid #cbd5e1;border-radius:4px;background:#fff;color:#334155;cursor:pointer;outline:none}

.q-bar{display:flex;gap:6px;align-items:center;margin-bottom:10px}
.q-pill{padding:4px 10px;font-size:11px;border-radius:20px;background:#fff;color:#555;border:1px solid #ddd;font-weight:500}
.q-pill b{color:#185FA5}
.prog-wrap{flex:1;height:4px;background:#ddd;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#185FA5;border-radius:2px;transition:width .3s}
.qcard{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;margin-bottom:8px}
.qhead{padding:10px 14px;background:#f0f4f9;border-bottom:1px solid #e5e5e5}
.qnum{font-size:11px;color:#666}
.qbody{padding:12px 14px}
.sit{font-size:12px;color:#555;margin-bottom:9px;padding:7px 10px;background:#f8f9fa;border-radius:8px;border-left:3px solid #185FA5;line-height:1.5}
.qt{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:9px;line-height:1.4}
.opts{display:flex;flex-direction:column;gap:5px}
.opt{padding:10px 12px;font-size:13px;text-align:left;border:1px solid #ddd;border-radius:9px;background:#fff;color:#1a1a1a;cursor:pointer;line-height:1.4;transition:background .15s}
.opt:hover{background:#f5f5f5}
.opt.reveal{border-color:#3B6D11;background:#EAF3DE;color:#27500A;font-weight:500}
.opt.wrong{border-color:#A32D2D;background:#FCEBEB;color:#791F1F}
.fb{display:none;margin-top:9px;padding:9px 11px;border-radius:9px;font-size:12px;line-height:1.6}
.fb.show{display:block}
.fb.ok{background:#EAF3DE;color:#27500A}
.fb.no{background:#FCEBEB;color:#791F1F}
.nxt{margin-top:9px;width:100%;padding:10px;font-size:13px;font-weight:600;border:none;border-radius:9px;background:#185FA5;color:#fff;cursor:pointer;display:none}
.nxt.show{display:block}
.nxt:active{background:#0f4a8a}
.done-box{text-align:center;padding:2.5rem 1rem;background:#fff;border-radius:12px;border:1px solid #e8e8e8}
.done-pct{font-size:48px;font-weight:700;color:#185FA5}
.done-sub{font-size:14px;color:#555;margin:.5rem 0 1.5rem;line-height:1.6}
.rbtn{padding:10px 24px;font-size:14px;font-weight:600;border:none;border-radius:9px;background:#185FA5;color:#fff;cursor:pointer}
.empty-msg{padding:2rem;text-align:center;color:#888;font-size:13px;background:#fff;border-radius:12px;border:1px solid #e8e8e8}

.footer{text-align:center;padding:16px 12px;font-size:11px;color:#888;background:#fff;border-top:1px solid #e8e8e8;margin-top:12px}
.footer a{color:#185FA5;text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="top-bar">
  <h1>TMF Muaythai – Hakem İngilizcesi Eğitim Modülü</h1>
  <p>Görev İngilizcesi · Referee English Training</p>
</div>
<div class="day-nav" id="day-nav"></div>
<div id="l2-nav-wrap"></div>
<div id="l3-nav-wrap"></div>
<div id="l4-nav-wrap"></div>

<div class="content" id="content"></div>

<div class="footer">
  Designed &amp; Developed by <strong>Afra UZ</strong><br>
  Voice generated by ElevenLabs · For feedback and suggestions: <a href="mailto:afrauz@outlook.com">afrauz@outlook.com</a>
</div>

<script>
// ─── 1. GLOBAL STATE DEFINITIONS ─────────────────────────────────
let curDay = "day1";
let curL2  = "registration";
let curL3  = null;
let curL4  = null;
let curSec = "kayit";
let qIdx = 0, score = 0, answered = false, shuffledQuiz = [];

// ─── 2. ALL FUNCTIONS (En Başa Alındı - Tanımsızlık Hatalarını Çözer) ───
function isScenario(id) {
  return id && (id === "senaryo" || id.startsWith("senaryo_") || id.startsWith("d2_senaryo"));
}

function playElevenLabsVoice(fileCode, selectElementId) {
  if (!fileCode) return;
  const speedSelect = document.getElementById(selectElementId);
  const targetSpeed = speedSelect ? parseFloat(speedSelect.value) : 0.8;

  const audioPath = `assets/audio/${fileCode}.mp3`;
  const audio = new Audio(audioPath);
  audio.playbackRate = targetSpeed;
  
  audio.play().catch(err => {
    console.log("Özel ses bulunamadı, Web Speech API devralıyor...");
    fallbackSpeak(fileCode, targetSpeed);
  });
}

function fallbackSpeak(txt, targetSpeed) {
  if (!window.speechSynthesis) return;
  let cleanText = txt;
  if(txt.includes('_')) {
     const currentList = investorsFindListByCode();
     if(currentList && currentList.length) {
        const indexStr = txt.split('_').pop();
        const numericIdx = parseInt(indexStr) - 1;
        if(currentList[numericIdx]) {
           cleanText = txt.includes('short') && currentList[numericIdx].alt ? currentList[numericIdx].alt : currentList[currentList[numericIdx] ? numericIdx : 0].en;
        }
     }
  }
  const u = new SpeechSynthesisUtterance(cleanText);
  u.lang = "en-US"; 
  u.rate = targetSpeed;
  speechSynthesis.cancel(); 
  speechSynthesis.speak(u);
}

function investorsFindListByCode() {
  const allP = Object.assign({}, PHRASES, (window.DAY2_PHRASES || {}));
  return allP[curSec] || [];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function resetQuiz() { qIdx = 0; score = 0; shuffledQuiz = []; }

// ─── NAV BUILDERS ───
function buildDayNav() {
  document.getElementById("day-nav").innerHTML =
    Object.entries(NAV).map(([id, d]) =>
      `<button class="day-btn${curDay===id?" active":""}" onclick="switchDay('${id}')">${d.label}</button>`
    ).join("");
}

function buildL2() {
  const day = NAV[curDay];
  document.getElementById("l2-nav-wrap").innerHTML =
    `<div class="l2-nav">${day.l2.map(n =>
      `<button class="l2-btn${curL2===n.id?" active":""}" onclick="switchL2('${n.id}')">${n.label}</button>`
    ).join("")}</div>`;
}

function buildL3() {
  const l2node = getL2Node();
  if (!l2node || l2node.isQuiz || !l2node.l3 || l2node.l3.length === 0) {
    document.getElementById("l3-nav-wrap").innerHTML = "";
    document.getElementById("l4-nav-wrap").innerHTML = "";
    return;
  }
  document.getElementById("l3-nav-wrap").innerHTML =
    `<div class="l3-nav">${l2node.l3.map(n =>
      `<button class="l3-btn${curL3===n.id?" active":""}" onclick="switchL3('${n.id}')">${n.label}</button>`
    ).join("")}</div>`;
  buildL4();
}

function buildL4() {
  const l3node = getL3Node();
  if (!l3node || l3node.leaf || !l3node.l4 || l3node.l4.length === 0) {
    document.getElementById("l4-nav-wrap").innerHTML = "";
    return;
  }
  document.getElementById("l4-nav-wrap").innerHTML =
    `<div class="l4-nav">${l3node.l4.map(n =>
      `<button class="l4-btn${curL4===n.id?" active":""}" onclick="switchL4('${n.id}')">${n.label}</button>`
    ).join("")}</div>`;
}

function getL2Node() { return NAV[curDay].l2.find(n => n.id === curL2); }
function getL3Node() {
  const l2 = getL2Node();
  if (!l2 || !l2.l3) return null;
  return l2.l3.find(n => n.id === curL3);
}

// ─── SWITCHERS ───
function switchDay(id) {
  curDay = id;
  resetQuiz();
  const firstL2 = NAV[id].l2[0];
  curL2 = firstL2.id;
  initL2(firstL2);
  buildDayNav(); buildL2();
}

// Güvenli düğüm kontrolü
function switchL2(id) {
  curL2 = id;
  resetQuiz();
  const l2 = getL2Node();
  if (l2) initL2(l2);
  buildL2();
}

function initL2(l2) {
  if (!l2) return;
  if (l2.isQuiz) {
    curL3 = null; curL4 = null; curSec = l2.quizId;
    document.getElementById("l3-nav-wrap").innerHTML = "";
    document.getElementById("l4-nav-wrap").innerHTML = "";
    render(); return;
  }
  if (!l2.l3 || l2.l3.length === 0) {
    curL3 = null; curL4 = null; curSec = l2.id;
    document.getElementById("l3-nav-wrap").innerHTML = "";
    document.getElementById("l4-nav-wrap").innerHTML = "";
    render(); return;
  }
  const firstL3 = l2.l3[0];
  curL3 = firstL3.id;
  initL3(firstL3);
  buildL3();
}

function switchL3(id) {
  curL3 = id;
  resetQuiz();
  const l3 = getL3Node();
  initL3(l3);
  buildL3();
}

function initL3(l3) {
  if (!l3) return;
  if (l3.leaf) {
    curL4 = null; curSec = l3.id;
    document.getElementById("l4-nav-wrap").innerHTML = "";
    render(); return;
  }
  if (l3.l4 && l3.l4.length > 0) {
    const firstL4 = l3.l4[0];
    curL4 = firstL4.id; curSec = firstL4.id;
    buildL4(); render(); return;
  }
  curL4 = null; curSec = l3.id;
  render();
}

function switchL4(id) {
  curL4 = id; curSec = id;
  resetQuiz();
  buildL4(); render();
}

// ─── RENDER ───
function render() {
  if (isScenario(curSec)) renderQuiz();
  else renderPhrases();
}

function renderPhrases() {
  const allP = Object.assign({}, PHRASES, (window.DAY2_PHRASES || {}));
  const list = allP[curSec] || [];
  const c = document.getElementById("content");
  if (!list.length) {
    c.innerHTML = `<div class="empty-msg">Bu bölüm yakında eklenecek. 🔜</div>`; return;
  }
  
  c.innerHTML = list.map((p, idx) => {
    const hasAlt = p.alt && p.alt.trim() !== "";
    const phonShort = p.phs && p.phs.trim() !== "" ? p.phs : "";
    const tamSesKodu = `${curSec}_${idx + 1}`;
    const kisaSesKodu = `${curSec}_${idx + 1}_short`;
    const selectId = `speed_sel_${curSec}_${idx}`;

    return `
    <div class="phrase-card">
      <div class="p-en">${p.en}</div>
      ${hasAlt ? `<div class="p-alt">↳ Kısa: ${p.alt}</div>` : ""}
      <div class="p-ph">${p.ph || ""}</div>
      ${hasAlt && phonShort ? `<div class="p-ph" style="color:#7ab0d4">↳ ${phonShort}</div>` : ""}
      <div class="p-tr">${p.tr}</div>
      <div class="btn-row">
        <button class="sbtn" onclick="playElevenLabsVoice('${tamSesKodu}', '${selectId}')">🔊 Tam</button>
        ${hasAlt ? `<button class="sbtn-alt" onclick="playElevenLabsVoice('${kisaSesKodu}', '${selectId}')">🔊 Kısa</button>` : ""}
        
        <div class="card-speed-wrapper">
          <span class="card-speed-label">HIZ:</span>
          <select class="card-speed-select" id="${selectId}">
            <option value="0.6">0.6x (Tane Tane)</option>
            <option value="0.8" selected>0.8x (Dengeli)</option>
            <option value="1.0">1.0x (Normal)</option>
          </select>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderQuiz() {
  const c = document.getElementById("content");
  let activeQuiz = QUIZ;
  if (curDay === "day2") {
    if (curSec === "d2_senaryo_jury" && window.QUIZ_JURY) activeQuiz = window.QUIZ_JURY;
    else if (window.DAY2_QUIZ) activeQuiz = window.DAY2_QUIZ;
  }
  if (!shuffledQuiz.length) shuffledQuiz = shuffle(activeQuiz);
  if (qIdx >= shuffledQuiz.length) { showDone(); return; }

  const q = shuffledQuiz[qIdx];
  const sOpts = shuffle(q.opts.map((o,i) => ({o, orig:i})));
  const newC = sOpts.findIndex(x => x.orig === q.c);
  answered = false;
  const quizSesKodu = `quiz_${curSec}_${qIdx + 1}`;
  const quizSelectId = `speed_sel_quiz_${curSec}_${qIdx}`;

  c.innerHTML = `
    <div class="q-bar">
      <div class="q-pill">Skor: <b id="sc">${score}</b></div>
      <div class="q-pill">Soru: <b>${qIdx+1}</b>/${shuffledQuiz.length}</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${Math.round(qIdx/shuffledQuiz.length*100)}%"></div></div>
    </div>
    <div class="qcard">
      <div class="qhead"><div class="qnum">Soru ${qIdx+1} / ${shuffledQuiz.length}</div></div>
      <div class="qbody">
        <div class="sit">${q.sit}</div>
        <div class="qt">${q.q}</div>
        <div class="opts">
          ${sOpts.map((x,i) =>
            `<button class="opt" data-idx="${i}" data-correct="${newC}" data-ex="${encodeURIComponent(q.ex)}" data-ans="${encodeURIComponent(sOpts[newC].o)}" data-ses="${quizSesKodu}">${x.o}</button>`
          ).join("")}
        </div>
        <div class="fb" id="fb"></div>
        <button class="nxt" id="nxt" onclick="nextQ()">${qIdx < shuffledQuiz.length-1 ? "Sonraki →" : "Sonuçları gör →"}</button>
      </div>
    </div>`;

  c.querySelectorAll(".opt").forEach(btn => btn.addEventListener("click", function() {
    checkAns(+this.dataset.idx, +this.dataset.correct,
      decodeURIComponent(this.dataset.ex), decodeURIComponent(this.dataset.ans), this.dataset.ses, quizSelectId);
  }));
}

function checkAns(idx, correct, ex, ans, sesKodu, quizSelectId) {
  if (answered) return;
  answered = true;
  document.querySelectorAll(".opt").forEach((b,i) => {
    if (i===correct) b.classList.add("reveal");
    else if (i===idx && idx!==correct) b.classList.add("wrong");
  });
  const fb = document.getElementById("fb");
  
  const fbContent = idx===correct ? 
    `${ex}<br>` : 
    `✗ Doğru: <strong>${ans}</strong><br>${ex}<br>`;

  fb.className = idx===correct ? "fb show ok" : "fb show no";
  fb.innerHTML = fbContent + `
    <div style="display:flex; align-items:center; gap:8px; margin-top:6px;">
      <button class="sbtn" id="sp-ans">🔊 Doğru Cevabı Dinle</button>
      <div class="card-speed-wrapper" style="margin-left:0;">
        <span class="card-speed-label">HIZ:</span>
        <select class="card-speed-select" id="${quizSelectId}">
          <option value="0.6">0.6x (Tane Tane)</option>
          <option value="0.8" selected>0.8x (Dengeli)</option>
          <option value="1.0">1.0x (Normal)</option>
        </select>
      </div>
    </div>`;
    
  document.getElementById("nxt").classList.add("show");
  
  const sb = document.getElementById("sp-ans");
  if (sb) sb.addEventListener("click", () => playElevenLabsVoice(sesKodu, quizSelectId));
}

// ─── 3. NAVIGATION TREE DATA STRUCTURE ─────────────────────────────
const NAV = {
  day1: {
    label: "Tartı ve Kayıt",
    l2: [
      {
        id: "registration", label: "Kayıt (Registration)",
        l3: [
          { id: "kayit",   label: "Kayıt & Belge (Registration & Documents)", leaf: true }
        ]
      },
      {
        id: "weighin", label: "Tartı (Weigh-In)",
        l3: [
          {
            id: "weighin_process", label: "Tartım Süreci (Weigh-In Process)",
            l4: [
              { id: "cagirma", label: "Tartıya Çağırma (Calling for Weigh-In)", leaf: true },
              { id: "kimlik",  label: "Kimlik & Belge (ID & Documents)", leaf: true },
              { id: "giyim",   label: "Giyim & Hazırlık (Dress & Preparation)", leaf: true },
              { id: "tartim",  label: "Tartım (Weighing)", leaf: true },
              { id: "sonuc",   label: "Tartı Sonucu (Weigh-In Results)", leaf: true },
              { id: "rapor",   label: "Tartı Sonu Raporu (Final Report)", leaf: true }
            ]
          },
          {
            id: "weighin_tech", label: "Teknik Sorunlar (Technical Issues)",
            l4: [
              { id: "sistem", label: "Sistemsel Sorunlar (System Errors)", leaf: true },
              { id: "baskul", label: "Baskül Sorunları (Scale Issues)", leaf: true }
            ]
          },
        ]
      },
      {
        id: "social", label: "Sosyal İletişim (Socializing)",
        l3: [
          { id: "sosyal", label: "Sosyal İletişim", leaf: true }
        ]
      },
      {
        id: "masterquiz", label: "▶ Senaryo Pratiği",
        l3: [],
        isQuiz: true,
        quizId: "senaryo"
      },
    ]
  },
  day2: {
    label: "Müsabaka Alanı",
    l2: [
      {
        id: "jury", label: "Jury",
        l3: [
          { id: "d2_juri_rap", label: "Raporlama (Reporting)", leaf: true },
          { id: "d2_juri_diy", label: "Genel İletişim (Communication)", leaf: true },
          { id: "d2_juri_gov", label: "Görevlendirme (Assignment)", leaf: true },
          { id: "d2_hakem",    label: "Hakem Sağlık (Referee Health)", leaf: true },
          { id: "d2_ring",     label: "Ring", leaf: true },
          { id: "d2_senaryo_jury", label: "▶ Senaryo Pratiği", leaf: true },
        ]
      },
      {
        id: "equipment", label: "Equipment",
