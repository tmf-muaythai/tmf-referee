.main-sec-btn.active{background:#185FA5;color:#fff}

.sec-nav{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px;background:#fff;border-bottom:1px solid #e0e8f0}

.sec-btn.active{background:#185FA5;border-color:#185FA5;color:#fff;font-weight:600}

.q-pill b{color:#185FA5}
.prog-wrap{flex:1;height:4px;background:#ddd;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#185FA5;border-radius:2px;transition:width .3s}
.qcard{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;margin-bottom:8px}
.qhead{padding:10px 14px;background:#f0f4f9;border-bottom:1px solid #e5e5e5}
.qnum{font-size:11px;color:#666}
.qbody{padding:12px 14px}

.qt{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:9px;line-height:1.4}

.opt:hover{background:#f5f5f5}
.opt.reveal{border-color:#3B6D11;background:#EAF3DE;color:#27500A;font-weight:500}
.opt.wrong{border-color:#A32D2D;background:#FCEBEB;color:#791F1F}

.fb.show{display:block}
.fb.ok{background:#EAF3DE;color:#27500A}
.fb.no{background:#FCEBEB;color:#791F1F}

.nxt.show{display:block}
.nxt:active{background:#0f4a8a}

let curDay = "day1";
let curSec = "kayit";
let curDay2Main = "jury";
let qIdx = 0;
let score = 0;
let answered = false;
let shuffledQuiz = [];

function speak(txt, rate) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = "en-US";
  u.rate = rate || 0.82;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDayNav() {
  const nav = document.getElementById("day-nav");
  nav.innerHTML = DAYS.map(d =>
    `<button class="day-btn${d.id === curDay ? " active" : ""}" onclick="switchDay('${d.id}')">${d.label}</button>`
  ).join("");
}

function buildDay1SecNav() {
  const nav = document.getElementById("sec-nav");
  nav.style.display = "grid";
  nav.innerHTML = DAY1_SECTIONS.map(s =>
    `<button class="sec-btn${s.id === curSec ? " active" : ""}" onclick="switchSec('${s.id}')">${s.label}</button>`
  ).join("");
}

function buildDay2MainNav() {
  const nav = document.getElementById("day2-main-nav");
  nav.innerHTML = `<div class="main-sec-nav">${DAY2_MAIN.map(m =>
    `<button class="main-sec-btn${m.id === curDay2Main ? " active" : ""}" onclick="switchDay2Main('${m.id}')">${m.label}</button>`
  ).join("")}</div>`;
}

function buildDay2SubNav() {
  const nav = document.getElementById("sec-nav");
  if (curDay2Main === "d2_senaryo") {
    nav.style.display = "none";
    return;
  }
  const subs = DAY2_SUBS[curDay2Main] || [];
  nav.style.display = "grid";
  nav.innerHTML = subs.map(s =>
    `<button class="sec-btn${s.id === curSec ? " active" : ""}" onclick="switchSec('${s.id}')">${s.label}</button>`
  ).join("");
}

function switchDay(id) {
  curDay = id;
  shuffledQuiz = [];
  score = 0;
  qIdx = 0;
  document.getElementById("day2-main-nav").innerHTML = "";
  if (id === "day1") {
    curSec = "kayit";
    buildDay1SecNav();
  } else {
    curDay2Main = "jury";
    const jurySubs = DAY2_SUBS["jury"];
    curSec = jurySubs[0].id;
    buildDay2MainNav();
    buildDay2SubNav();
  }
  buildDayNav();
  render();
}

function switchDay2Main(id) {
  curDay2Main = id;
  shuffledQuiz = [];
  score = 0;
  qIdx = 0;
  if (id === "d2_senaryo") {
    curSec = "d2_senaryo";
  } else {
    const subs = DAY2_SUBS[id] || [];
    curSec = subs.length > 0 ? subs[0].id : "";
  }
  buildDay2MainNav();
  buildDay2SubNav();
  render();
}

function switchSec(id) {
  curSec = id;
  if (curDay === "day1") {
    buildDay1SecNav();
  } else {
    buildDay2SubNav();
  }
  render();
}

function render() {
  if (curSec === "senaryo" || curSec === "d2_senaryo") {
    renderQuiz();
  } else {
    renderPhrases();
  }
}

function renderPhrases() {
  const allPhrases = Object.assign({}, PHRASES, (typeof window.DAY2_PHRASES !== "undefined" ? window.DAY2_PHRASES : {}));
  const list = allPhrases[curSec] || [];
  const c = document.getElementById("content");
  if (!list.length) {
    c.innerHTML = `<div class="empty-msg">Bu bölüm yakında eklenecek. 🔜</div>`;
    return;
  }
  c.innerHTML = list.map(p => `
    <div class="phrase-card">
      <div class="p-en">${p.en}</div>
      ${p.alt && p.alt !== p.en ? `<div class="p-alt">↳ Kısa: ${p.alt}</div>` : ""}
      <div class="p-ph">${p.ph || (p.phs ? "Kısa: " + p.phs : "")}</div>
      <div class="p-tr">${p.tr}</div>
      <div class="btn-row">
        <button class="sbtn" onclick="speak(${JSON.stringify(p.en)})">🔊 Tam</button>
        ${p.alt && p.alt !== p.en ? `<button class="sbtn-alt" onclick="speak(${JSON.stringify(p.alt)})">🔊 Kısa</button>` : ""}
      </div>
    </div>`).join("");
}

function renderQuiz() {
  const c = document.getElementById("content");
  const activeQuiz = (curDay === "day2" && typeof window.DAY2_QUIZ !== "undefined") ? window.DAY2_QUIZ : QUIZ;
  if (shuffledQuiz.length === 0) shuffledQuiz = shuffle(activeQuiz);
  if (qIdx >= shuffledQuiz.length) { showDone(); return; }

  const q = shuffledQuiz[qIdx];
  const shuffledOpts = shuffle(q.opts.map((o, i) => ({ o, orig: i })));
  const newCorrect = shuffledOpts.findIndex(x => x.orig === q.c);
  answered = false;

  c.innerHTML = `
    <div class="q-bar">
      <div class="q-pill">Skor: <b id="sc">${score}</b></div>
      <div class="q-pill">Soru: <b>${qIdx + 1}</b> / ${shuffledQuiz.length}</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${Math.round(qIdx / shuffledQuiz.length * 100)}%"></div></div>
    </div>
    <div class="qcard">
      <div class="qhead"><div class="qnum">Soru ${qIdx + 1} / ${shuffledQuiz.length}</div></div>
      <div class="qbody">
        <div class="sit">${q.sit}</div>
        <div class="qt">${q.q}</div>
        <div class="opts">
          ${shuffledOpts.map((x, i) =>
    `<button class="opt" id="o${i}" data-idx="${i}" data-correct="${newCorrect}" data-ex="${encodeURIComponent(q.ex)}" data-ans="${encodeURIComponent(shuffledOpts[newCorrect].o)}">${x.o}</button>`
  ).join("")}
        </div>
        <div class="fb" id="fb"></div>
        <button class="nxt" id="nxt" onclick="nextQ()">${qIdx < shuffledQuiz.length - 1 ? "Sonraki soru →" : "Sonuçları gör →"}</button>
      </div>
    </div>`;

  document.querySelectorAll(".opt").forEach(btn => {
    btn.addEventListener("click", function() {
      checkAns(parseInt(this.dataset.idx), parseInt(this.dataset.correct),
        decodeURIComponent(this.dataset.ex), decodeURIComponent(this.dataset.ans));
    });
  });
}

function checkAns(idx, correct, ex, ans) {
  if (answered) return;
  answered = true;
  document.querySelectorAll(".opt").forEach((b, i) => {
    if (i === correct) b.classList.add("reveal");
    else if (i === idx && idx !== correct) b.classList.add("wrong");
  });
  const fb = document.getElementById("fb");
  if (idx === correct) {
    score++;
    document.getElementById("sc").textContent = score;
    fb.className = "fb show ok";
    fb.innerHTML = ex + `<br><button class="sbtn" style="margin-top:6px" id="speak-ans">🔊 Dinle</button>`;
  } else {
    fb.className = "fb show no";
    fb.innerHTML = `✗ Doğru: <strong>${ans}</strong><br>${ex}<br><button class="sbtn" style="margin-top:6px" id="speak-ans">🔊 Dinle</button>`;
  }
  document.getElementById("nxt").classList.add("show");
  const sb = document.getElementById("speak-ans");
  if (sb) sb.addEventListener("click", () => speak(ans));
}

function nextQ() { qIdx++; renderQuiz(); }

function showDone() {
  const pct = Math.round(score / shuffledQuiz.length * 100);
  document.getElementById("content").innerHTML = `
    <div class="done-box">
      <div class="done-pct">${pct}%</div>
      <div class="done-sub">${shuffledQuiz.length} sorudan <strong>${score}</strong> doğru.<br>
      ${pct >= 80 ? "🏆 Harika! Sahaya hazırsın." : pct >= 60 ? "👍 İyi gidiyor — bir kez daha dene." : "📚 Cümleleri tekrar çalış ve yeniden dene."}</div>
      <button class="rbtn" onclick="restartQuiz()">↺ Tekrar Başla</button>
    </div>`;
}

function restartQuiz() { qIdx = 0; score = 0; shuffledQuiz = []; renderQuiz(); }

</script>
